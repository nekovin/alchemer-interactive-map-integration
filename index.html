<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alchemer Google Maps Question</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h2 {
            margin-bottom: 5px;
        }
        p {
            color: #666;
            margin-top: 0;
            margin-bottom: 15px;
        }
        #map {
            width: 100%;
            height: 600px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <h2>Please select the parks you have visited in the last 12 months</h2>
    <p>Click on a park to select it</p>

    <!-- map cont -->
    <div id="map"></div>

    <!-- search bar -->
    <!-- https://stackoverflow.com/questions/69917128/how-to-search-a-json-file-from-a-search-bar-in-html -->
    <div class="topnav"> 
    <!--  <a href="#contact">Contact</a> -->
      <input type="text" id="searchbar" placeholder="Search for parks here..">
      <ul id="list-holder">
      </ul>
    </div>

    <h3>Your selected parks (<span id="selected-count">0</span>)</h3>
    <p id="selected-empty">No parks selected yet.</p>
    <ul id="selected-holder">
    </ul>

    <button id="myButton">Submit selection</button>

    <script type="module">
      (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Ignoring:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({
        key: "AIzaSyBnhF8F278dHno51nyrbqBEQn_rELO4mQE", // #TODO delete this from the repo and add to .env file
        v: "weekly",
      });

      const parkData = (await import("./parks_data.json", { with: { type: "json" } })).default;
      const { Map: GoogleMap } = await google.maps.importLibrary("maps");

      const map = new GoogleMap(document.getElementById("map"), {
        zoom: 11,
        center: { lat: -37.8080, lng: 144.9750 },
      });
        
      let userSelections = [];

      // Registry so both the map and the search bar can drive the same park.
      const parkRegistry = new Map(); // park.name -> { park, polygon, selected }

      // Single source of truth for selecting / deselecting a park.
      function setSelected(entry, selected) {
        entry.selected = selected;
        entry.polygon.setOptions({
          fillColor: selected ? entry.park.selectedColor : entry.park.defaultColor,
          strokeColor: selected ? entry.park.selectedColor : entry.park.defaultColor
        });

        if (selected) {
          if (!userSelections.includes(entry.park.name)) {
            userSelections.push(entry.park.name);
          }
        } else {
          userSelections = userSelections.filter(item => item !== entry.park.name);
        }

        renderSelections();
        console.log("Current Selections Array:", userSelections);
      }

      // Show the user's current selections; clicking one removes it.
      const selectedHolder = document.getElementById("selected-holder");
      const selectedCount = document.getElementById("selected-count");
      const selectedEmpty = document.getElementById("selected-empty");

      function renderSelections() {
        selectedHolder.innerHTML = "";
        selectedCount.textContent = userSelections.length;
        selectedEmpty.style.display = userSelections.length ? "none" : "";

        userSelections.forEach(name => {
          const entry = parkRegistry.get(name);
          const li = document.createElement("li");
          li.textContent = name + "  ✕";
          li.title = "Click to remove";
          li.style.cursor = "pointer";
          li.addEventListener("click", () => setSelected(entry, false));
          selectedHolder.appendChild(li);
        });
      }

      parkData.forEach(park => {
        const polygonHighlight = new google.maps.Polygon({
          paths: park.coords,
          strokeColor: park.defaultColor,
          strokeOpacity: 0.8,
          strokeWeight: 2,
          fillColor: park.defaultColor,
          fillOpacity: 0.35,
          map: map
        });

        const entry = { park, polygon: polygonHighlight, selected: false };
        parkRegistry.set(park.name, entry);

        google.maps.event.addListener(polygonHighlight, 'click', function() {
          setSelected(entry, !entry.selected);
        });
      });

      // ---- Search: filter the real parks and let results select + focus a park ----
      const searchbar = document.getElementById("searchbar");
      const listHolder = document.getElementById("list-holder");
      const MAX_RESULTS = 50;

      searchbar.addEventListener("keyup", () => {
        const input = searchbar.value.trim().toLowerCase();
        listHolder.innerHTML = "";
        if (!input) return; // don't dump all 3,558 parks on an empty query

        const matches = parkData
          .filter(park => park.name.toLowerCase().includes(input))
          .slice(0, MAX_RESULTS);

        matches.forEach(park => {
          const entry = parkRegistry.get(park.name);
          const li = document.createElement("li");
          li.style.cursor = "pointer";
          li.textContent = park.name + (entry.selected ? " ✓" : "");

          li.addEventListener("click", () => {
            setSelected(entry, !entry.selected);
            li.textContent = park.name + (entry.selected ? " ✓" : "");
            const firstPoint = entry.park.coords?.[0]?.[0]; // first point of first ring
            if (firstPoint) {
              map.panTo(firstPoint);
              map.setZoom(15);
            }
          });

          listHolder.appendChild(li);
        });
      });

      document.getElementById("myButton").addEventListener("click", () => {
        console.log("selections: ", userSelections);
      });

      //TODO: make sure to account for somebody pressing submit then changing their choice

    </script>

</body>
</html>
